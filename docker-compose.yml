version: '3.8'

services:
  # ==========================================
  # 1. BANCO DE DADOS (PostgreSQL) - O seu original!
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: ifood_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: ifood_db
    ports:
      - "5433:5432" # Porta externa 5433 para evitar conflitos no seu Mac
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ==========================================
  # 2. BACKEND (FastAPI / Python)
  # ==========================================
  backend:
    build: ./backend
    container_name: ifood_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      # O Backend conversa com o banco pela rede interna do Docker (porta 5432)
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/ifood_db
      # Puxa a sua chave do arquivo .env ou do sistema
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  # ==========================================
  # 3. FRONTEND (Next.js / React)
  # ==========================================
  frontend:
    build: ./frontend
    container_name: ifood_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/pedidos

volumes:
  postgres_data: